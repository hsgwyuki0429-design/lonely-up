<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LONELY UP">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e1526">
<title>LONELY UP - ひたすら上へ</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" href="/icons/icon-192.png" type="image/png">
<link rel="stylesheet" href="/css/style.css">
<script src="/env.js"></script>
<script src="/vendor/supabase.js"></script>
<script type="importmap">
  { "imports": { "three": "/vendor/three.module.js" } }
</script>
</head>
<body>
<canvas id="game"></canvas>
<div id="glow"></div>
<div id="flash"></div>

<!-- ===== HUD ===== -->
<div id="hud" class="hidden">
  <div id="topbar">
    <div class="stat">
      <span class="label">高度</span>
      <span id="height" class="value">0.0m</span>
    </div>
    <div class="stat">
      <span class="label">ベスト</span>
      <span id="best" class="value">0.0m</span>
    </div>
    <div class="stat">
      <span class="label">タイム</span>
      <span id="timer" class="value">0:00</span>
    </div>
    <div class="stat">
      <span class="label">オンライン</span>
      <span id="online" class="value">1</span>
    </div>
  </div>
  <div id="topbtns">
    <button id="btnHome" class="iconbtn" aria-label="ホームに戻る">🏠</button>
    <button id="btnRank" class="iconbtn" aria-label="ランキング">🏆</button>
    <button id="btnRestart" class="iconbtn" aria-label="リスタート">↻</button>
  </div>
  <div id="combo" class="hidden"><span id="comboNum">2</span><span class="combolabel">COMBO</span></div>
  <div id="rewards"></div>
  <div id="joy"><div id="joyKnob"></div></div>
  <button id="btnBow" aria-label="会釈">🙇</button>
</div>

<div id="toasts"></div>
<div id="appVer" class="appver"></div>

<!-- ===== タイトル ===== -->
<div id="title" class="panel">
  <h1>LONELY UP</h1>
  <p class="tagline">ひたすら上へ。落ちたら、自分のせい。</p>
  <input id="nameInput" type="text" maxlength="12" placeholder="なまえ (12文字まで)" autocomplete="off">
  <button id="btnStart" class="primary">のぼる</button>
  <div class="howto">
    <div>🖐 片手で遊べます</div>
    <div>🕹 画面のどこでもドラッグ : 移動</div>
    <div>🦘 タップ : ジャンプ / 走れば端や段差で自動ジャンプ</div>
    <div>👀 カメラ : 自動で背後に回り込む</div>
    <div>🙇 おじぎボタン : 会釈 (みんなに見える)</div>
    <div class="pc">PC : WASD + Space / C で会釈 / マウスでカメラ</div>
  </div>
  <div class="setting">
    <label class="checkrow"><input id="lowCam" type="checkbox"> 📷 キャラを下寄りに表示（上が見やすい）</label>
  </div>
  <div id="netStatus" class="netstatus">オフラインモード</div>
</div>

<!-- ===== ランキング ===== -->
<div id="rankPanel" class="panel hidden">
  <h2>🏆 世界ランキング</h2>
  <div id="rankList" class="ranklist"><div class="rankrow">読み込み中...</div></div>
  <button id="btnRankClose" class="primary">とじる</button>
</div>

<!-- ===== クリア ===== -->
<div id="clearPanel" class="panel hidden">
  <h2>🎉 登頂!!</h2>
  <p id="clearTime" class="cleartime">0:00</p>
  <p class="tagline">きみはもう、ひとりじゃない。</p>
  <button id="btnClearRank" class="primary">ランキングを見る</button>
  <button id="btnClearRestart" class="ghostbtn">もう一度のぼる</button>
</div>

<script type="module" src="/js/main.js"></script>
<script>
  // PWA: ホーム画面追加 (A2HS) 対応 + 更新の自動反映。
  // 新バージョンをデプロイしたとき、古いキャッシュのJSと新HTMLが混ざって
  // 起動不能になるのを防ぐため、新しい SW が有効化されたら一度だけ再読み込みして
  // すべてのファイルを同じバージョンに揃える。
  if ('serviceWorker' in navigator) {
    // ページ読み込み時点で既にSWに制御されていたか。初回インストール時の
    // 不要な再読み込みを避けるため (更新のときだけ再読み込みする) に使う。
    const hadController = !!navigator.serviceWorker.controller;
    let reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloading || !hadController) return; // 初回インストールでは再読み込みしない
      reloading = true;
      window.location.reload();
    });
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then((reg) => {
        // 起動時にも更新を確認し、待機中の新SWがあれば即時反映させる
        reg.update?.();
      }).catch(() => {});
    });
  }
</script>
</body>
</html>
