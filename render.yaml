services:
  - type: web
    name: lonely-up
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # 管理者用リセット機能を使う場合のみ設定 (未設定ならリセットは無効)
      - key: SUPABASE_SERVICE_ROLE_KEY   # Supabase > Project Settings > API の service_role キー
        sync: false
      - key: ADMIN_PASSWORD              # 管理者リセットの合言葉 (自分で決める)
        sync: false
